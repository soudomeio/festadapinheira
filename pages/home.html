<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inicio - Festa da Pinheira</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .acao-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 18px;
      z-index: 10;
      backdrop-filter: blur(8px);
      display: none;
    }
    .acao-badge.show { display: block; animation: badgePop 0.3s ease; }
    .acao-badge.interesse { background: rgba(72, 187, 120, 0.8); color: #fff; border: 2px solid #48bb78; }
    .acao-badge.talvez { background: rgba(236, 201, 75, 0.8); color: #1a202c; border: 2px solid #ecc94b; }
    .acao-badge.nao { background: rgba(245, 101, 101, 0.8); color: #fff; border: 2px solid #f56565; }
    .acao-mini {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(8px);
      z-index: 5;
    }
    .acao-mini.interesse { background: rgba(72, 187, 120, 0.3); color: #48bb78; border: 1px solid #48bb78; }
    .acao-mini.talvez { background: rgba(236, 201, 75, 0.3); color: #ecc94b; border: 1px solid #ecc94b; }
    .acao-mini.nao { background: rgba(245, 101, 101, 0.3); color: #f56565; border: 1px solid #f56565; }
    @keyframes badgePop {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Guest Badge -->
    <div id="guestBadge" class="guest-badge hidden">CONVIDADO</div>

    <!-- Top Bar -->
    <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <div style="width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 12px solid #ecc94b;"></div>
        <span style="color: #ecc94b; font-weight: 700; font-size: 13px; letter-spacing: 0.5px;">FESTA DA PINHEIRA</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <button id="btnDesfazer" onclick="desfazerAcao()" class="hidden" style="background: rgba(45,55,72,0.9); border: 1px solid #4a5568; border-radius: 20px; padding: 4px 12px; color: #ecc94b; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          Desfazer
        </button>
        <div id="userAvatar" style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: #2d3748;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="#4a5568"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>
    </div>

    <!-- Card Area -->
    <div id="cardArea" style="flex: 1; display: flex; flex-direction: column; padding-bottom: 16px;">
      <!-- Profile Card -->
      <div id="profileCard" class="card-container" style="flex: 1; min-height: 400px; position: relative;">
        <div id="cardBg" class="card-image" style="background-image: url(''); cursor: pointer;"></div>
        <div class="card-overlay"></div>

        <!-- Badge de acao anterior -->
        <div id="acaoBadge" class="acao-badge">
          <span id="acaoBadgeText"></span>
        </div>

        <!-- Mini badge de acao anterior -->
        <div id="acaoMini" class="acao-mini" style="display: none;">
          <span id="acaoMiniIcon"></span>
          <span id="acaoMiniText"></span>
        </div>

        <!-- Ver Fotos Button -->
        <button id="btnVerFotos" style="position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); border: none; border-radius: 20px; padding: 6px 14px; display: flex; align-items: center; gap: 6px; cursor: pointer; color: #ecc94b; font-size: 12px; font-weight: 600;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <span id="fotoCount">1 foto</span>
        </button>
        <button id="infoBtn" style="position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </button>
        <div class="card-info">
          <h2 id="cardName" class="card-name">--</h2>
          <div class="card-location">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span id="cardCity">--</span>
          </div>
          <div id="cardTags" class="card-tags"></div>
          <div id="cardDetails" style="margin-top: 12px; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); border-radius: 12px; padding: 12px; display: none;">
            <p style="color: #fff; font-size: 13px;"><span style="color: #a0aec0;">Ele:</span> <span id="detailDele">--</span></p>
            <p style="color: #fff; font-size: 13px; margin-top: 4px;"><span style="color: #a0aec0;">Ela:</span> <span id="detailDela">--</span></p>
            <p id="detailBio" style="color: #a0aec0; font-size: 12px; margin-top: 6px; font-style: italic;"></p>
          </div>
        </div>
      </div>

      <!-- Swipe Buttons -->
      <div class="swipe-actions">
        <button id="btnNao" class="swipe-btn reject">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button id="btnTalvez" class="swipe-btn maybe">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
        <button id="btnInteresse" class="swipe-btn like">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
      <p style="text-align: center; color: #4a5568; font-size: 11px;" id="swipeHint">Perfis restantes: <span id="perfisRestantes">0</span></p>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center;">
      <div style="width: 80px; height: 80px; background: #2d3748; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <h3 style="color: #fff; font-size: 18px; margin-bottom: 8px;">Fim da rodada!</h3>
      <p style="color: #a0aec0; font-size: 14px;">Voce viu todos os casais. Inicie uma nova rodada!</p>
      <button onclick="novaRodada()" class="btn btn-primary" style="margin-top: 20px; width: auto; padding: 12px 24px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; vertical-align: middle; margin-right: 6px;"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Nova Rodada
      </button>
    </div>

    <!-- Photo Gallery Modal -->
    <div id="galleryModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; flex-direction: column;">
      <div style="display: flex; align-items: center; justify-content: space-between; padding: 16px;">
        <button onclick="closeGallery()" style="background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Voltar
        </button>
        <span id="galleryCounter" style="color: #a0aec0; font-size: 14px;">1 / 3</span>
        <div style="width: 60px;"></div>
      </div>
      <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative;">
        <img id="galleryMainImg" src="" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px;">
        <button id="galleryPrev" style="position: absolute; left: 16px; width: 44px; height: 44px; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button id="galleryNext" style="position: absolute; right: 16px; width: 44px; height: 44px; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div id="galleryThumbs" style="display: flex; gap: 8px; padding: 16px; overflow-x: auto; justify-content: center;"></div>
      <div id="galleryProfileName" style="text-align: center; padding-bottom: 20px; color: #ecc94b; font-weight: 700; font-size: 16px;"></div>
    </div>

    <!-- Match Overlay -->
    <div id="matchOverlay" class="match-overlay">
      <div class="match-content">
        <div class="heart-pulse" style="font-size: 80px; margin-bottom: 20px;">💕</div>
        <h2 style="color: #fff; font-size: 32px; font-weight: 700; margin-bottom: 8px;">E um Match!</h2>
        <p style="color: #a0aec0; margin-bottom: 24px;">Voces se interessaram!</p>
        <button onclick="closeMatch()" class="btn btn-primary" style="width: auto; padding: 14px 32px;">Continuar</button>
        <br><br>
        <a href="chat.html" class="btn btn-outline" style="width: auto; padding: 10px 24px; text-decoration: none; display: inline-block;">Ir para Chat</a>
      </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="home.html" class="nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Inicio
      </a>
      <a href="chat.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Chat
      </a>
      <a href="matches.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Matches
      </a>
      <a href="perfil.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Perfil
      </a>
    </nav>
  </div>

  <script src="../assets/js/app.js"></script>
  <script>
    // Setup user avatar
    const currentUser = getCurrentUser();
    if (currentUser && currentUser.fotos && currentUser.fotos[0]) {
      document.getElementById('userAvatar').innerHTML = `<img src="${currentUser.fotos[0]}" style="width: 100%; height: 100%; object-fit: cover;">`;
    }

    // ===== RODADAS =====
    // Guarda acoes por rodada: { profileId: 'interesse'|'talvez'|'nao' }
    function getRodadaAtual() {
      try { return parseInt(sessionStorage.getItem('fp_rodada') || '1'); } catch { return 1; }
    }
    function setRodada(n) { sessionStorage.setItem('fp_rodada', String(n)); }
    function getAcoes() {
      const r = getRodadaAtual();
      try { return JSON.parse(sessionStorage.getItem('fp_acoes_' + r) || '{}'); } catch { return {}; }
    }
    function setAcao(profileId, acao) {
      const r = getRodadaAtual();
      const acoes = getAcoes();
      acoes[profileId] = acao;
      sessionStorage.setItem('fp_acoes_' + r, JSON.stringify(acoes));
    }
    function getAcaoAnterior(profileId) {
      // Busca na rodada anterior
      const r = getRodadaAtual();
      if (r <= 1) return null;
      try {
        const acoes = JSON.parse(sessionStorage.getItem('fp_acoes_' + (r - 1)) || '{}');
        return acoes[profileId] || null;
      } catch { return null; }
    }

    window.novaRodada = function() {
      const r = getRodadaAtual() + 1;
      setRodada(r);
      currentIndex = 0;
      lastProfileId = null;
      updateDesfazerBtn();
      document.getElementById('cardArea').classList.remove('hidden');
      document.getElementById('cardArea').style.display = 'flex';
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('emptyState').style.display = 'none';
      const available = getAvailableProfiles();
      document.getElementById('perfisRestantes').textContent = available.length > 0 ? `1 de ${available.length}` : '0';
      showProfile();
    };

    // ===== PROFILES =====
    let allProfiles = [];
    let currentIndex = 0;
    let currentProfileFotos = [];
    let currentProfileName = '';
    let galleryIdx = 0;

    function getMyId() {
      const u = getCurrentUser();
      return u ? u.id : 'guest';
    }

    async function loadProfiles() {
      try {
        const data = await getProfiles();
        if (data && data.length > 0) {
          allProfiles = data.map(p => ({
            id: p.id, nick: p.nick, nomeDele: p.nomeDele, nomeDela: p.nomeDela,
            cidade: p.cidade, preferencias: p.preferencias || [], fotos: p.fotos || [],
            bio: p.bio || '', idadeDele: p.idadeDele || 30, idadeDela: p.idadeDela || 28, online: p.online || false,
          }));
        }
      } catch (e) {
        allProfiles = [];
      }
      currentIndex = 0;
      showProfile();
    }

    function getAvailableProfiles() {
      const myId = getMyId();
      // Filtra: proprio perfil + perfis sem acao na rodada atual
      const acoes = getAcoes();
      return allProfiles.filter(p => {
        if (p.id === myId) return false; // nao mostra si mesmo
        // So filtra se JA deu acao NESTA rodada
        return !acoes[p.id];
      });
    }

    function showProfile() {
      const available = getAvailableProfiles();
      if (currentIndex >= available.length) {
        document.getElementById('cardArea').classList.add('hidden');
        document.getElementById('cardArea').style.display = 'none';
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('emptyState').style.display = 'flex';
        return;
      }

      document.getElementById('cardArea').classList.remove('hidden');
      document.getElementById('cardArea').style.display = 'flex';
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('emptyState').style.display = 'none';

      const p = available[currentIndex];
      const fallbackFoto = 'https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=600&h=800&fit=crop';
      const foto = (p.fotos && p.fotos[0]) ? p.fotos[0] : fallbackFoto;
      const cardBg = document.getElementById('cardBg');
      cardBg.style.backgroundImage = `url('${foto}')`;
      const testImg = new Image();
      testImg.onerror = () => { cardBg.style.backgroundImage = `url('${fallbackFoto}')`; };
      testImg.src = foto;

      currentProfileFotos = (p.fotos || []).filter(f => f && !f.startsWith('blob:')).length > 0 ? p.fotos.filter(f => f && !f.startsWith('blob:')) : [fallbackFoto];
      currentProfileName = p.nick || '---';
      document.getElementById('fotoCount').textContent = currentProfileFotos.length === 1 ? '1 foto' : `${currentProfileFotos.length} fotos`;

      document.getElementById('cardName').textContent = p.nick || '---';
      document.getElementById('cardCity').textContent = p.cidade || '---';
      document.getElementById('detailDele').textContent = `${p.nomeDele || '---'}, ${p.idadeDele || '--'} anos`;
      document.getElementById('detailDela').textContent = `${p.nomeDela || '---'}, ${p.idadeDela || '--'} anos`;
      document.getElementById('detailBio').textContent = p.bio || '';

      const tagsEl = document.getElementById('cardTags');
      tagsEl.innerHTML = '';
      (p.preferencias || []).slice(0, 3).forEach(pref => {
        tagsEl.innerHTML += `<span class="tag">${getPrefLabel(pref)}</span>`;
      });

      // Atualiza contador de perfis restantes
      document.getElementById('perfisRestantes').textContent = `${currentIndex + 1} de ${available.length}`;

      // Mostra acao anterior se existe
      const acaoAnt = getAcaoAnterior(p.id);
      const badge = document.getElementById('acaoBadge');
      const mini = document.getElementById('acaoMini');
      const badgeText = document.getElementById('acaoBadgeText');
      const miniIcon = document.getElementById('acaoMiniIcon');
      const miniText = document.getElementById('acaoMiniText');

      if (acaoAnt) {
        const labels = { interesse: 'Voce curtiu', talvez: 'Talvez role', nao: 'Passou' };
        const icons = { interesse: '❤️', talvez: '⭐', nao: '❌' };
        badgeText.textContent = labels[acaoAnt];
        badge.className = 'acao-badge ' + acaoAnt;
        badge.classList.add('show');
        setTimeout(() => badge.classList.remove('show'), 2000);

        miniIcon.textContent = icons[acaoAnt];
        miniText.textContent = 'Rodada anterior: ' + labels[acaoAnt];
        mini.className = 'acao-mini ' + acaoAnt;
        mini.style.display = 'flex';
      } else {
        badge.classList.remove('show');
        mini.style.display = 'none';
      }
    }

    // ===== SWIPE (fora de showProfile para evitar conflito de const) =====
    async function swipe(direction) {
      const swipeAvail = getAvailableProfiles();
      if (currentIndex >= swipeAvail.length) return;

      const p = swipeAvail[currentIndex];
      const statusMap = { right: 'interesse', up: 'talvez', left: 'nao' };
      const acao = statusMap[direction];
      const myId = getMyId();

      // Guarda acao desta rodada
      setAcao(p.id, acao);
      lastProfileId = p.id;
      updateDesfazerBtn();

      // Salva no Supabase
      try {
        await addMatchSupabase(myId, p.id, acao);
      } catch (e) { console.log('Match erro:', e); }

      // Animacao
      if (acao === 'interesse') {
        // Verifica se e match mutuo
        try {
          const matches = await getMatchesSupabase();
          const isMutual = matches.some(m =>
            ((m.from_profile_id === myId && m.to_profile_id === p.id) ||
             (m.from_profile_id === p.id && m.to_profile_id === myId)) &&
            m.mutual
          );
          if (isMutual) {
            document.getElementById('matchOverlay').classList.add('show');
            return; // nao avanca, espera clicar
          }
        } catch (e) { /* fallback */ }
      }

      currentIndex++;
      const afterAvail = getAvailableProfiles();
      document.getElementById('perfisRestantes').textContent = currentIndex < afterAvail.length ? `${currentIndex + 1} de ${afterAvail.length}` : '0';
      showProfile();
    }

    window.closeMatch = function() {
      document.getElementById('matchOverlay').classList.remove('show');
      currentIndex++;
      lastProfileId = null;
      updateDesfazerBtn();
      const cmAvail = getAvailableProfiles();
      document.getElementById('perfisRestantes').textContent = currentIndex < cmAvail.length ? `${currentIndex + 1} de ${cmAvail.length}` : '0';
      showProfile();
    };

    // ===== DESFAZER =====
    let lastProfileId = null;

    function updateDesfazerBtn() {
      const btn = document.getElementById('btnDesfazer');
      if (lastProfileId && currentIndex > 0) btn.classList.remove('hidden');
      else btn.classList.add('hidden');
    }

    window.desfazerAcao = async function() {
      if (!lastProfileId || currentIndex <= 0) return;

      // Remove a acao do sessionStorage desta rodada
      const acoes = getAcoes();
      delete acoes[lastProfileId];
      sessionStorage.setItem('fp_acoes_' + getRodadaAtual(), JSON.stringify(acoes));

      // Volta para o perfil anterior
      currentIndex--;
      lastProfileId = null;
      updateDesfazerBtn();

      // Atualiza o Supabase: remove o match da rodada atual
      const myId = getMyId();
      try {
        await apiDelete('matches', `?from_profile_id=eq.${myId}&to_profile_id=eq.${lastProfileId}`);
      } catch (e) { /* ignora erro */ }

      const desfAvail = getAvailableProfiles();
      document.getElementById('perfisRestantes').textContent = currentIndex < desfAvail.length ? `${currentIndex + 1} de ${desfAvail.length}` : '0';
      showProfile();
    };

    // ===== EVENT LISTENERS =====
    let infoOpen = false;
    document.getElementById('infoBtn').addEventListener('click', () => {
      infoOpen = !infoOpen;
      document.getElementById('cardDetails').style.display = infoOpen ? 'block' : 'none';
    });
    document.getElementById('btnNao').addEventListener('click', () => swipe('left'));
    document.getElementById('btnTalvez').addEventListener('click', () => swipe('up'));
    document.getElementById('btnInteresse').addEventListener('click', () => swipe('right'));

    let touchStartX = 0;
    const card = document.getElementById('profileCard');
    card.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    card.addEventListener('touchend', e => {
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 80) swipe(diff > 0 ? 'right' : 'left');
    }, { passive: true });

    // ===== GALERIA =====
    function openGallery() {
      if (!currentProfileFotos || currentProfileFotos.length === 0) return;
      galleryIdx = 0;
      updateGallery();
      document.getElementById('galleryModal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }
    window.closeGallery = function() {
      document.getElementById('galleryModal').style.display = 'none';
      document.body.style.overflow = '';
    };
    function updateGallery() {
      document.getElementById('galleryMainImg').src = currentProfileFotos[galleryIdx];
      document.getElementById('galleryCounter').textContent = `${galleryIdx + 1} / ${currentProfileFotos.length}`;
      document.getElementById('galleryProfileName').textContent = currentProfileName;
      const thumbs = document.getElementById('galleryThumbs');
      thumbs.innerHTML = '';
      currentProfileFotos.forEach((url, i) => {
        const d = document.createElement('div');
        d.style.cssText = `width:56px;height:56px;border-radius:8px;overflow:hidden;cursor:pointer;flex-shrink:0;border:2px solid ${i===galleryIdx?'#ecc94b':'transparent'};`;
        d.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">`;
        d.onclick = () => { galleryIdx = i; updateGallery(); };
        thumbs.appendChild(d);
      });
    }
    document.getElementById('cardBg').addEventListener('click', openGallery);
    document.getElementById('btnVerFotos').addEventListener('click', (e) => { e.stopPropagation(); openGallery(); });
    document.getElementById('galleryPrev').addEventListener('click', () => { if (galleryIdx > 0) { galleryIdx--; updateGallery(); } });
    document.getElementById('galleryNext').addEventListener('click', () => { if (galleryIdx < currentProfileFotos.length - 1) { galleryIdx++; updateGallery(); } });

    document.addEventListener('keydown', (e) => {
      if (document.getElementById('galleryModal').style.display !== 'flex') return;
      if (e.key === 'ArrowLeft' && galleryIdx > 0) { galleryIdx--; updateGallery(); }
      else if (e.key === 'ArrowRight' && galleryIdx < currentProfileFotos.length - 1) { galleryIdx++; updateGallery(); }
      else if (e.key === 'Escape') closeGallery();
    });

    // Load
    loadProfiles();
  </script>
</body>
</html>
