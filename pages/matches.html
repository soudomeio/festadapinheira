<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Matches - Festa da Pinheira</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body>
  <div class="app-container">
    <div id="guestBadge" class="guest-badge hidden">CONVIDADO</div>

    <div class="page-content">
      <h1 class="section-title">Perfis Cadastrados</h1>
      <p style="color: #a0aec0; font-size: 13px; margin-bottom: 16px;">Todos os casais cadastrados. Faca sua reacao e inicie um chat quando quiser.</p>
      <div id="listAll"></div>
    </div>

    <nav class="bottom-nav">
      <a href="home.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Inicio
      </a>
      <a href="chat.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Chat
      </a>
      <a href="matches.html" class="nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Matches
      </a>
      <a href="editar-perfil.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Perfil
      </a>
    </nav>
  </div>

  <script type="module" src="../assets/js/app.js"></script>
  <script>
    let allProfiles = [];
    let myReactions = {};

    async function loadData() {
      try {
        const data = await getProfiles();
        if (data && data.length > 0) {
          allProfiles = data.map(p => ({
            id: p.id, nick: p.nick, cidade: p.cidade, fotos: p.fotos || [],
            nome_dele: p.nome_dele || '', nome_dela: p.nome_dela || '',
            online: p.online || false, preferencias: p.preferencias || [],
          }));
        }
      } catch (e) {
        allProfiles = DB.get('profiles', []);
      }
      try { myReactions = await getMyReactions(getMyId()); } catch (e) { myReactions = {}; }
      renderAll();
    }

    async function reactProfile(profileId, status) {
      const myId = getMyId();
      try {
        await addMatchSupabase(myId, profileId, status);
        myReactions[profileId] = status;
        renderAll();
      } catch (e) {
        alert('Erro ao salvar reacao');
      }
    }

    function renderAll() {
      const el = document.getElementById('listAll');
      const myId = getMyId();
      const profiles = allProfiles.filter(p => p.id !== myId);

      if (profiles.length === 0) {
        el.innerHTML = `<div style="background: #2d3748; border-radius: 16px; padding: 24px; text-align: center;"><p style="color: #a0aec0; font-size: 14px;">Nenhum perfil cadastrado ainda.</p></div>`;
        return;
      }

      el.innerHTML = '';
      profiles.forEach(p => {
        const foto = (p.fotos && p.fotos[0]) ? p.fotos[0] : 'https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=200&h=200&fit=crop';
        const reaction = myReactions[p.id];
        const reactionColors = { interesse: '#48bb78', talvez: '#ecc94b', nao: '#f56565' };
        const reactionLabels = { interesse: 'Interesse', talvez: 'Talvez', nao: 'Passou' };
        const reactionIcons = {
          interesse: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
          talvez: '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
          nao: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
        };

        const reactionBadge = reaction
          ? `<div style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;background:${reactionColors[reaction]}20;color:${reactionColors[reaction]};border:1px solid ${reactionColors[reaction]};">${reactionIcons[reaction]} ${reactionLabels[reaction]}</div>`
          : '';

        el.innerHTML += `
          <div class="match-card" style="flex-direction:column;align-items:stretch;gap:0;padding:16px;">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
              <div style="position:relative;">
                <div class="match-avatar">
                  <img src="${foto}" alt="" onerror="this.src='https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=200&h=200&fit=crop'">
                </div>
                ${p.online ? '<div class="online-dot"></div>' : ''}
              </div>
              <div class="match-info">
                <div class="match-name">${p.nick || '---'}</div>
                <div style="font-size: 12px; color: #a0aec0; display: flex; align-items: center; gap: 4px; margin-top: 2px;">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  ${p.cidade || '---'}
                </div>
                ${reactionBadge}
              </div>
              <a href="chat.html?p=${p.id}" style="width: 40px; height: 40px; background: #ecc94b; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; text-decoration:none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a202c" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
              </a>
            </div>
            <div style="display:flex;gap:8px;">
              <button onclick="reactProfile('${p.id}','nao')" style="flex:1;padding:10px;border-radius:12px;border:2px solid ${reaction==='nao'?'#f56565':'#2d3748'};background:${reaction==='nao'?'#f5656520':'transparent'};color:#f56565;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-size:13px;font-weight:600;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Passar
              </button>
              <button onclick="reactProfile('${p.id}','talvez')" style="flex:1;padding:10px;border-radius:12px;border:2px solid ${reaction==='talvez'?'#ecc94b':'#2d3748'};background:${reaction==='talvez'?'#ecc94b20':'transparent'};color:#ecc94b;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-size:13px;font-weight:600;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                Talvez
              </button>
              <button onclick="reactProfile('${p.id}','interesse')" style="flex:1;padding:10px;border-radius:12px;border:2px solid ${reaction==='interesse'?'#48bb78':'#2d3748'};background:${reaction==='interesse'?'#48bb7820':'transparent'};color:#48bb78;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-size:13px;font-weight:600;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                Interesse
              </button>
            </div>
          </div>`;
      });
    }

    window.reactProfile = reactProfile;
    loadData();
  </script>
</body>
</html>
