<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Perfis - Festa da Pinheira</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .profile-grid-card {
      background: #2d3748; border-radius: 16px; padding: 12px; margin-bottom: 12px;
      display: flex; gap: 12px; align-items: center;
    }
    .pg-avatar {
      width: 64px; height: 64px; border-radius: 12px; overflow: hidden;
      background: #1a202c; flex-shrink: 0; cursor: pointer;
    }
    .pg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .pg-info { flex: 1; min-width: 0; }
    .pg-name { font-weight: 700; font-size: 15px; color: #fff; }
    .pg-city { font-size: 12px; color: #a0aec0; margin-top: 2px; }
    .pg-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .pg-btn {
      width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid;
      background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .pg-btn.nao { border-color: #f56565; color: #f56565; }
    .pg-btn.talvez { border-color: #ecc94b; color: #ecc94b; }
    .pg-btn.interesse { border-color: #48bb78; color: #48bb78; }
    .pg-btn.active.nao { background: #f56565; color: #fff; }
    .pg-btn.active.talvez { background: #ecc94b; color: #1a202c; }
    .pg-btn.active.interesse { background: #48bb78; color: #fff; }
    .pg-chat {
      width: 36px; height: 36px; border-radius: 50%; background: #ecc94b;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer; text-decoration: none;
    }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
    .filter-tab {
      background: #2d3748; border: 1px solid #4a5568; color: #a0aec0;
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .filter-tab.active { background: #ecc94b; color: #1a202c; border-color: #ecc94b; }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="guestBadge" class="guest-badge hidden">CONVIDADO</div>

    <div class="page-content">
      <h1 class="section-title">Perfis</h1>

      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">Todos</button>
        <button class="filter-tab" data-filter="mutual" onclick="setFilter('mutual')">Matches Mutuos</button>
        <button class="filter-tab" data-filter="interesse" onclick="setFilter('interesse')">Meus Interesses</button>
        <button class="filter-tab" data-filter="talvez" onclick="setFilter('talvez')">Talvez</button>
      </div>

      <div id="profilesList"></div>
    </div>

    <nav class="bottom-nav">
      <a href="chat.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Chat
      </a>
      <a href="matches.html" class="nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Perfis
      </a>
      <a href="perfil.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Perfil
      </a>
    </nav>
  </div>

  <script src="../assets/js/app.js"></script>
  <script>
    let allProfiles = [];
    let myMatches = {}; // { otherId: { status, mutual } }
    let currentFilter = 'all';
    const currentUser = getCurrentUser();
    const myId = currentUser ? currentUser.id : '';

    async function loadData() {
      try {
        allProfiles = await getProfiles();
      } catch (e) { allProfiles = []; }

      // Carrega meus matches (interesses/talvez/nao ja dados)
      try {
        const matches = await getMatchesSupabase();
        myMatches = {};
        matches.forEach(m => {
          const otherId = m.from_profile_id === myId ? m.to_profile_id : m.from_profile_id;
          // Prioriza o meu match (from = eu)
          if (m.from_profile_id === myId) {
            myMatches[otherId] = { status: m.status, mutual: m.mutual };
          } else if (!myMatches[otherId]) {
            myMatches[otherId] = { status: null, mutual: m.mutual, theyLike: m.status === 'interesse' };
          }
        });
      } catch (e) {}
      render();
    }

    window.setFilter = function(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.filter === f);
      });
      render();
    };

    function render() {
      const list = document.getElementById('profilesList');
      let profiles = allProfiles.filter(p => p.id !== myId);

      if (currentFilter === 'mutual') {
        profiles = profiles.filter(p => myMatches[p.id] && myMatches[p.id].mutual);
      } else if (currentFilter === 'interesse') {
        profiles = profiles.filter(p => myMatches[p.id] && myMatches[p.id].status === 'interesse');
      } else if (currentFilter === 'talvez') {
        profiles = profiles.filter(p => myMatches[p.id] && myMatches[p.id].status === 'talvez');
      }

      if (profiles.length === 0) {
        list.innerHTML = `<div style="background:#2d3748;border-radius:16px;padding:24px;text-align:center;"><p style="color:#a0aec0;font-size:14px;">Nenhum perfil aqui.</p></div>`;
        return;
      }

      list.innerHTML = '';
      profiles.forEach(p => {
        const foto = (p.fotos && p.fotos[0]) ? p.fotos[0] : '';
        const m = myMatches[p.id] || {};
        const st = m.status;

        list.innerHTML += `
          <div class="profile-grid-card">
            <div class="pg-avatar" onclick="openProfileGallery('${p.id}')">
              <img src="${foto}" alt="" onerror="this.style.display='none'">
            </div>
            <div class="pg-info">
              <div class="pg-name">${escapeHtml(p.nick || '---')} ${m.mutual ? '<span style="color:#f56565;font-size:12px;">&#9829; Match</span>' : ''}</div>
              <div class="pg-city">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${escapeHtml(p.cidade || '---')}
              </div>
              <div class="pg-actions">
                <button class="pg-btn nao ${st==='nao'?'active':''}" onclick="reagir('${p.id}','nao')" title="Nao">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
                <button class="pg-btn talvez ${st==='talvez'?'active':''}" onclick="reagir('${p.id}','talvez')" title="Talvez">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </button>
                <button class="pg-btn interesse ${st==='interesse'?'active':''}" onclick="reagir('${p.id}','interesse')" title="Interesse">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </button>
              </div>
            </div>
            <a class="pg-chat" href="chat.html?to=${p.id}" title="Conversar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a202c" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            </a>
          </div>`;
      });
    }

    window.reagir = async function(profileId, acao) {
      if (!currentUser) { alert('Faca login para reagir.'); return; }
      const prev = myMatches[profileId] || {};
      // Otimista
      myMatches[profileId] = { ...prev, status: acao };
      render();
      try {
        const res = await addMatchSupabase(myId, profileId, acao);
        if (res && res.mutual) {
          myMatches[profileId].mutual = true;
          render();
        }
      } catch (e) { console.log('Erro reagir', e); }
    };

    // ===== GALERIA COM COMENTARIOS =====
    let galProfile = null;
    let galIdx = 0;

    window.openProfileGallery = function(profileId) {
      const p = allProfiles.find(x => x.id === profileId);
      if (!p) return;
      const fotos = (p.fotos || []).filter(Boolean);
      if (fotos.length === 0) return;
      galProfile = { ...p, fotos };
      galIdx = 0;
      document.getElementById('galModal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
      updateGal();
    };
    window.closeGal = function() {
      document.getElementById('galModal').style.display = 'none';
      document.body.style.overflow = '';
      galProfile = null;
    };
    async function updateGal() {
      if (!galProfile) return;
      const url = galProfile.fotos[galIdx];
      document.getElementById('galImg').src = url;
      document.getElementById('galCount').textContent = `${galIdx + 1} / ${galProfile.fotos.length}`;
      document.getElementById('galName').textContent = galProfile.nick || '';
      const thumbs = document.getElementById('galThumbs');
      thumbs.innerHTML = '';
      galProfile.fotos.forEach((u, i) => {
        const d = document.createElement('div');
        d.style.cssText = `width:48px;height:48px;border-radius:8px;overflow:hidden;cursor:pointer;flex-shrink:0;border:2px solid ${i===galIdx?'#ecc94b':'transparent'};`;
        d.innerHTML = `<img src="${u}" style="width:100%;height:100%;object-fit:cover;">`;
        d.onclick = () => { galIdx = i; updateGal(); };
        thumbs.appendChild(d);
      });
      await loadComentarios(url);
    }

    async function loadComentarios(photoUrl) {
      const box = document.getElementById('galComments');
      box.innerHTML = '<div style="color:#4a5568;font-size:12px;text-align:center;padding:8px;">Carregando...</div>';
      try {
        const all = await getGlobalMessages();
        const prefix = '[PC]' + photoUrl + '|||';
        const comments = (all || []).filter(m => (m.content || '').startsWith(prefix));
        if (comments.length === 0) {
          box.innerHTML = '<div style="color:#4a5568;font-size:12px;text-align:center;padding:8px;">Nenhum comentario ainda.</div>';
          return;
        }
        box.innerHTML = comments.map(m => {
          const text = m.content.substring(prefix.length);
          return `<div style="padding:8px 10px;background:#2d3748;border-radius:10px;margin-bottom:6px;">
            <div style="font-size:11px;color:#ecc94b;font-weight:600;">${escapeHtml(m.senderNick || 'Usuario')}</div>
            <div style="font-size:13px;color:#fff;margin-top:2px;">${escapeHtml(text)}</div>
          </div>`;
        }).join('');
      } catch (e) {
        box.innerHTML = '<div style="color:#f56565;font-size:12px;text-align:center;padding:8px;">Erro ao carregar.</div>';
      }
    }

    window.enviarComentario = async function() {
      if (!currentUser) { alert('Faca login para comentar.'); return; }
      const input = document.getElementById('galCommentInput');
      const text = input.value.trim();
      if (!text || !galProfile) return;
      const url = galProfile.fotos[galIdx];
      const content = '[PC]' + url + '|||' + text;
      input.value = '';
      try {
        await sendMessageSupabase(myId, currentUser.nick, content, false, null);
      } catch (e) {}
      await loadComentarios(url);
    };

    loadData();
  </script>

  <!-- Gallery Modal com Comentarios -->
  <div id="galModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:500;flex-direction:column;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;">
      <button onclick="closeGal()" style="background:none;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:14px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Voltar
      </button>
      <span id="galCount" style="color:#a0aec0;font-size:13px;">1 / 1</span>
      <span id="galName" style="color:#ecc94b;font-weight:700;font-size:14px;"></span>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-height:200px;">
      <img id="galImg" src="" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:12px;">
    </div>
    <div id="galThumbs" style="display:flex;gap:6px;padding:8px 16px;overflow-x:auto;justify-content:center;"></div>
    <div style="background:#1a202c;border-top:1px solid #2d3748;padding:10px 12px;max-height:40vh;display:flex;flex-direction:column;">
      <div style="font-size:12px;color:#a0aec0;font-weight:600;margin-bottom:6px;">Comentarios</div>
      <div id="galComments" style="overflow-y:auto;flex:1;margin-bottom:8px;max-height:25vh;"></div>
      <div style="display:flex;gap:6px;">
        <input id="galCommentInput" type="text" placeholder="Escreva um comentario..." style="flex:1;background:#2d3748;border:1px solid #4a5568;border-radius:20px;padding:8px 14px;color:#fff;font-size:13px;outline:none;" onkeypress="if(event.key==='Enter')enviarComentario()">
        <button onclick="enviarComentario()" style="background:#ecc94b;border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a202c" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</body>
</html>
