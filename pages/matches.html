<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Matches - Festa da Pinheira</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body>
  <div class="app-container">
    <!-- Guest Badge -->
    <div id="guestBadge" class="guest-badge hidden">CONVIDADO</div>

    <div class="page-content">
      <h1 class="section-title">Meus Matches</h1>

      <!-- Mutual Matches -->
      <div style="margin-bottom: 24px;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#f56565" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <h2 style="font-size: 16px; font-weight: 700;">Matches Mutuos</h2>
          <span id="countMutual" style="background: #f56565; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px;">0</span>
        </div>
        <div id="listMutual"></div>
      </div>

      <!-- My Interests -->
      <div style="margin-bottom: 24px;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#48bb78" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <h2 style="font-size: 16px; font-weight: 700;">Meus Interesses</h2>
          <span id="countInterest" style="background: #48bb78; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px;">0</span>
        </div>
        <div id="listInterest"></div>
      </div>

      <!-- Maybe -->
      <div>
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#ecc94b" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <h2 style="font-size: 16px; font-weight: 700;">Talvez Role</h2>
          <span id="countMaybe" style="background: #ecc94b; color: #1a202c; font-size: 11px; padding: 2px 8px; border-radius: 10px;">0</span>
        </div>
        <div id="listMaybe"></div>
      </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="home.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Inicio
      </a>
      <a href="chat.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Chat
      </a>
      <a href="matches.html" class="nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Matches
      </a>
      <a href="perfil.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Perfil
      </a>
    </nav>
  </div>

  <script src="../assets/js/app.js"></script>
  <script>
    function renderMatches() {
      const matches = getMatches();
      const profiles = DB.get('profiles', []);

      const mutual = matches.filter(m => m.mutual);
      const interested = matches.filter(m => m.status === 'interesse' && !m.mutual);
      const maybe = matches.filter(m => m.status === 'talvez');

      document.getElementById('countMutual').textContent = mutual.length;
      document.getElementById('countInterest').textContent = interested.length;
      document.getElementById('countMaybe').textContent = maybe.length;

      renderList('listMutual', mutual, profiles, true);
      renderList('listInterest', interested, profiles, false);
      renderList('listMaybe', maybe, profiles, false, true);
    }

    function renderList(elId, matches, profiles, showChat, isMaybe) {
      const el = document.getElementById(elId);
      if (matches.length === 0) {
        el.innerHTML = `<div style="background: #2d3748; border-radius: 16px; padding: 24px; text-align: center;"><p style="color: #a0aec0; font-size: 14px;">Nenhum resultado aqui.</p></div>`;
        return;
      }

      el.innerHTML = '';
      matches.forEach(m => {
        const p = profiles.find(prof => prof.id === m.coupleId);
        if (!p) return;

        el.innerHTML += `
          <div class="match-card" style="${isMaybe ? 'opacity: 0.6;' : ''}">
            <div style="position: relative;">
              <div class="match-avatar">
                <img src="${p.fotos[0]}" alt="">
              </div>
              ${showChat ? '<div style="position: absolute; bottom: -2px; right: -2px; width: 20px; height: 20px; background: #f56565; border-radius: 50%; display: flex; align-items: center; justify-content: center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="white" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>' : ''}
            </div>
            <div class="match-info">
              <div class="match-name">${p.nick}</div>
              <div style="font-size: 12px; color: #a0aec0; display: flex; align-items: center; gap: 4px; margin-top: 2px;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${p.cidade}
              </div>
            </div>
            ${showChat ? `<a href="chat.html" style="width: 40px; height: 40px; background: #ecc94b; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a202c" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></a>` : ''}
          </div>`;
      });
    }

    renderMatches();
  </script>
</body>
</html>
