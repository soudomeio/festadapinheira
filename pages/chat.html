<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat - Festa da Pinheira</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body>
  <div class="app-container">
    <!-- Guest Badge -->
    <div id="guestBadge" class="guest-badge hidden">CONVIDADO</div>

    <!-- Header -->
    <div style="padding: 16px 16px 12px;">
      <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 12px;">Mensagens</h1>
      <div class="chat-tabs">
        <button id="tabGlobal" class="chat-tab active" onclick="switchTab('global')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; vertical-align: middle; margin-right: 4px;"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Global
        </button>
        <button id="tabPrivate" class="chat-tab" onclick="switchTab('private')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; vertical-align: middle; margin-right: 4px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Privado
        </button>
      </div>
    </div>

    <!-- Global Chat -->
    <div id="globalChat" style="padding: 0 16px; padding-bottom: 130px; overflow-y: auto; height: calc(100vh - 160px);">
      <div id="globalMessages"></div>
    </div>

    <!-- Private Chat List -->
    <div id="privateList" class="hidden" style="padding: 0 16px; padding-bottom: 80px;">
      <div id="privateConversations"></div>
    </div>

    <!-- Private Chat Room -->
    <div id="privateRoom" class="hidden">
      <div style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #2d3748;">
        <button onclick="backToPrivateList()" style="background: none; border: none; color: #a0aec0; cursor: pointer; padding: 4px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <div id="roomAvatar" style="width: 40px; height: 40px; border-radius: 50%; overflow: hidden; background: #2d3748;"></div>
        <div>
          <div id="roomName" style="font-weight: 600;">--</div>
          <div style="font-size: 11px; color: #48bb78;">Online</div>
        </div>
      </div>
      <div id="privateMessages" style="padding: 16px; padding-bottom: 130px; overflow-y: auto; height: calc(100vh - 220px);">
        <div class="chat-system"><span>Voces combinaram! Agora podem conversar.</span></div>
        <div id="privateMsgList"></div>
      </div>
    </div>

    <!-- Chat Input -->
    <div id="chatInputArea" class="chat-input-area">
      <input type="text" id="messageInput" class="chat-input" placeholder="Digite uma mensagem..." onkeypress="if(event.key==='Enter')sendCurrentMessage()">
      <button onclick="sendCurrentMessage()" class="chat-send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="home.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Inicio
      </a>
      <a href="chat.html" class="nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Chat
      </a>
      <a href="matches.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Matches
      </a>
      <a href="perfil.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Perfil
      </a>
    </nav>
  </div>

  <script src="../assets/js/app.js"></script>
  <script>
    const currentUser = getCurrentUser();
    let activeTab = 'global';
    let activePrivateChat = null;
    let allProfiles = [];

    async function loadProfiles() {
      try {
        const data = await getProfiles();
        if (data && data.length > 0) {
          allProfiles = data.map(p => ({
            id: p.id, nick: p.nick, cidade: p.cidade, fotos: p.fotos || [],
            nomeDele: p.nome_dele, nomeDela: p.nome_dela, online: p.online || false,
            preferencias: p.preferencias || [],
          }));
        }
      } catch (e) {
        allProfiles = DB.get('profiles', []);
      }
    }

    function switchTab(tab) {
      activeTab = tab;
      activePrivateChat = null;
      document.getElementById('tabGlobal').classList.toggle('active', tab === 'global');
      document.getElementById('tabPrivate').classList.toggle('active', tab === 'private');
      document.getElementById('globalChat').classList.toggle('hidden', tab !== 'global');
      document.getElementById('privateList').classList.toggle('hidden', tab !== 'private' || activePrivateChat);
      document.getElementById('privateRoom').classList.add('hidden');
      document.getElementById('chatInputArea').classList.remove('hidden');

      if (tab === 'global') renderGlobalMessages();
      else renderPrivateList();
    }

    async function renderGlobalMessages() {
      let msgs = [];
      try {
        msgs = await getGlobalMessages();
      } catch (e) {
        console.log('Erro carregando mensagens:', e);
        msgs = DB.get('messages', []).filter(m => !m.isPrivate);
      }

      const container = document.getElementById('globalMessages');
      const myId = currentUser ? currentUser.id : 'guest';
      container.innerHTML = '';

      if (!msgs || msgs.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#4a5568;padding:40px;">Nenhuma mensagem ainda. Seja o primeiro!</div>';
        return;
      }

      msgs.forEach(msg => {
        const senderId = msg.senderId || msg.sender_id || 'unknown';
        const senderNick = msg.senderNick || msg.sender_nick || 'Usuario';
        const content = msg.content || '';
        const timestamp = msg.timestamp || (msg.created_at ? new Date(msg.created_at).getTime() : Date.now());

        if (senderId === 'system') {
          container.innerHTML += `<div class="chat-system"><span>${content}</span></div>`;
        } else {
          const isMe = senderId === myId;
          container.innerHTML += `
            <div class="chat-msg ${isMe ? 'own' : ''}">
              ${!isMe ? `<div style="margin-right: 8px; min-width: 0;"><div style="font-size: 11px; color: #ecc94b; margin-bottom: 2px; font-weight: 600;">${senderNick}</div>` : '<div style="max-width: 75%;">'}
              <div class="chat-bubble">
                <div>${escapeHtml(content)}</div>
                <div class="chat-time">${formatTime(timestamp)}</div>
              </div>
              ${!isMe ? '</div>' : '</div>'}
            </div>`;
        }
      });
      scrollToBottom('globalChat');
    }

    async function renderPrivateList() {
      let matches = [];
      try {
        const data = await getMatchesSupabase();
        matches = data.filter(m => m.mutual);
      } catch (e) {
        matches = DB.get('matches', []).filter(m => m.mutual);
      }

      const container = document.getElementById('privateConversations');

      if (matches.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 60px 20px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="2" style="margin: 0 auto 16px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <h3 style="color: #fff; margin-bottom: 8px;">Sem conversas privadas</h3>
            <p style="color: #a0aec0; font-size: 14px;">De match em alguem para comecar uma conversa.</p>
            <a href="home.html" style="display: inline-block; margin-top: 16px; background: #ecc94b; color: #1a202c; padding: 10px 20px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 14px;">Explorar Perfis</a>
          </div>`;
        return;
      }

      container.innerHTML = '';
      const shownIds = new Set(); // evita duplicados

      matches.forEach(m => {
        // Pega o OUTRO perfil do match (nao o usuario atual)
        const myId = currentUser ? currentUser.id : '';
        const otherId = m.from_profile_id === myId ? m.to_profile_id : m.from_profile_id;

        if (shownIds.has(otherId)) return; // ja mostrou
        shownIds.add(otherId);

        const p = allProfiles.find(prof => prof.id === otherId);
        if (!p) return;

        container.innerHTML += `
          <div onclick="openPrivateChat('${p.id}')" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 4px;" onmouseover="this.style.background='#2d3748'" onmouseout="this.style.background='transparent'">
            <div style="position: relative;">
              <div style="width: 50px; height: 50px; border-radius: 50%; overflow: hidden; background: #2d3748;">
                <img src="${(p.fotos && p.fotos[0]) ? p.fotos[0] : ''}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.style.display='none'">
              </div>
              ${p.online ? '<div class="online-dot"></div>' : ''}
            </div>
            <div style="flex: 1; min-width: 0;">
              <div style="font-weight: 600;">${p.nick || '---'}</div>
              <div style="font-size: 13px; color: #a0aec0;">Clique para conversar</div>
            </div>
          </div>`;
      });
    }

    window.openPrivateChat = function(coupleId) {
      activePrivateChat = coupleId;
      const p = allProfiles.find(prof => prof.id === coupleId);

      document.getElementById('privateList').classList.add('hidden');
      document.getElementById('privateRoom').classList.remove('hidden');
      document.getElementById('roomAvatar').innerHTML = `<img src="${p && p.fotos && p.fotos[0] ? p.fotos[0] : ''}" style="width: 100%; height: 100%; object-fit: cover;">`;
      document.getElementById('roomName').textContent = p ? p.nick : '---';
      renderPrivateMessages();
    };

    window.backToPrivateList = function() {
      activePrivateChat = null;
      document.getElementById('privateRoom').classList.add('hidden');
      document.getElementById('privateList').classList.remove('hidden');
      renderPrivateList();
    };

    async function renderPrivateMessages() {
      if (!activePrivateChat) return;
      const myId = currentUser ? currentUser.id : 'guest';

      let msgs = [];
      try {
        msgs = await getPrivateMessages(myId, activePrivateChat);
      } catch (e) {
        msgs = DB.get('messages', []).filter(msg =>
          msg.isPrivate && (msg.senderId === activePrivateChat || (msg.senderId === myId && msg.receiverId === activePrivateChat))
        );
      }

      const container = document.getElementById('privateMsgList');
      container.innerHTML = '';

      if (!msgs || msgs.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#4a5568;padding:20px;">Nenhuma mensagem ainda. Diga oi!</div>';
        return;
      }

      msgs.forEach(msg => {
        const senderId = msg.senderId || msg.sender_id || 'unknown';
        const senderNick = msg.senderNick || msg.sender_nick || 'Usuario';
        const content = msg.content || '';
        const timestamp = msg.timestamp || (msg.created_at ? new Date(msg.created_at).getTime() : Date.now());
        const isMe = senderId === myId;

        container.innerHTML += `
          <div class="chat-msg ${isMe ? 'own' : ''}">
            ${!isMe ? `<div style="font-size: 11px; color: #ecc94b; margin-bottom: 2px; font-weight: 600;">${senderNick}</div>` : ''}
            <div class="chat-bubble">
              <div>${escapeHtml(content)}</div>
              <div class="chat-time">${formatTime(timestamp)}</div>
            </div>
          </div>`;
      });
      scrollToBottom('privateMessages');
    }

    window.sendCurrentMessage = async function() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      if (!content) return;

      const myId = currentUser ? currentUser.id : 'guest';
      const myNick = currentUser ? currentUser.nick : 'Convidado';

      if (activeTab === 'global') {
        try {
          await sendMessageSupabase(myId, myNick, content, false, null);
        } catch (e) {
          // Local fallback
        }
        renderGlobalMessages();
      } else if (activePrivateChat) {
        try {
          await sendMessageSupabase(myId, myNick, content, true, activePrivateChat);
        } catch (e) {
          // Local fallback
        }
        renderPrivateMessages();
      }
      input.value = '';
    };

    function scrollToBottom(elId) {
      const el = document.getElementById(elId);
      if (el) el.scrollTop = el.scrollHeight;
    }

    // Atualizar mensagens automaticamente a cada 3 segundos
    setInterval(() => {
      if (activeTab === 'global') {
        renderGlobalMessages();
      } else if (activeTab === 'private') {
        if (activePrivateChat) {
          renderPrivateMessages();
        } else {
          renderPrivateList(); // atualiza lista de conversas
        }
      }
    }, 3000);

    // Init
    loadProfiles().then(() => renderGlobalMessages());
  </script>
</body>
</html>
