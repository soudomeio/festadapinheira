<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Editar Perfil - Festa da Pinheira</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div class="page-header">
      <a href="perfil.html" class="back-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <h1>Editar Perfil</h1>
      <div style="width: 36px;"></div>
    </div>

    <div class="page-content">
      <!-- Fotos -->
      <div style="margin-bottom: 24px;">
        <h2 style="font-size: 16px; font-weight: 700; margin-bottom: 12px;">Fotos do Casal</h2>
        <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
        <div id="photoGrid" class="photo-grid">
          <div id="btnAddPhoto" class="photo-add">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <span style="font-size: 11px; margin-top: 4px;">Adicionar</span>
          </div>
        </div>
        <p id="uploadStatus" style="color: #ecc94b; font-size: 12px; margin-top: 4px;"></p>
      </div>

      <!-- Dados do Casal -->
      <div style="margin-bottom: 24px;">
        <h2 style="font-size: 16px; font-weight: 700; margin-bottom: 12px;">Dados do Casal</h2>

        <div class="input-group">
          <label class="input-label">Nick do Casal</label>
          <input type="text" id="editNick" class="input-field" disabled style="opacity: 0.6;">
          <p style="color: #4a5568; font-size: 11px; margin-top: 4px;">O nick nao pode ser alterado</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="input-group">
            <label class="input-label">Nome Dele</label>
            <input type="text" id="editNomeDele" class="input-field">
          </div>
          <div class="input-group">
            <label class="input-label">Nome Dela</label>
            <input type="text" id="editNomeDela" class="input-field">
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="input-group">
            <label class="input-label">Idade Dele</label>
            <input type="number" id="editIdadeDele" class="input-field" min="18" max="99">
          </div>
          <div class="input-group">
            <label class="input-label">Idade Dela</label>
            <input type="number" id="editIdadeDela" class="input-field" min="18" max="99">
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Cidade</label>
          <input type="text" id="editCidade" class="input-field">
        </div>

        <div class="input-group">
          <label class="input-label">Bio / Sobre</label>
          <textarea id="editBio" class="input-field" rows="3" placeholder="Conte um pouco sobre voces..."></textarea>
        </div>
      </div>

      <!-- Preferencias -->
      <div style="margin-bottom: 24px;">
        <h2 style="font-size: 16px; font-weight: 700; margin-bottom: 12px;">Preferencias</h2>
        <div id="prefList">
          <div class="pref-item" data-pref="trocas">
            <div class="pref-checkbox"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a202c" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            <span class="pref-label">Trocas de Casais</span>
          </div>
          <div class="pref-item" data-pref="mesmo_ambiente">
            <div class="pref-checkbox"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a202c" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            <span class="pref-label">Sexo no mesmo ambiente</span>
          </div>
          <div class="pref-item" data-pref="solteiras">
            <div class="pref-checkbox"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a202c" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            <span class="pref-label">Somente Solteiras</span>
          </div>
          <div class="pref-item" data-pref="solteiros">
            <div class="pref-checkbox"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a202c" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            <span class="pref-label">Somente Solteiros</span>
          </div>
          <div class="pref-item" data-pref="curioso">
            <div class="pref-checkbox"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a202c" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            <span class="pref-label">Apenas Curioso</span>
          </div>
        </div>
      </div>

      <!-- Status -->
      <div class="input-group" style="margin-bottom: 24px;">
        <label class="input-label">Status</label>
        <div style="display: flex; gap: 12px;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; flex: 1; background: #2d3748; padding: 12px; border-radius: 12px;">
            <input type="radio" name="status" value="true" id="statusOnline" checked>
            <span style="color: #48bb78; font-size: 14px;">● Online</span>
          </label>
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; flex: 1; background: #2d3748; padding: 12px; border-radius: 12px;">
            <input type="radio" name="status" value="false" id="statusOffline">
            <span style="color: #a0aec0; font-size: 14px;">○ Offline</span>
          </label>
        </div>
      </div>

      <button id="btnSave" class="btn btn-primary" style="margin-bottom: 12px;">Salvar Alteracoes</button>
      <a href="perfil.html" style="display: block; text-align: center; color: #a0aec0; text-decoration: none; padding: 12px;">Cancelar</a>

      <p id="saveStatus" style="text-align: center; margin-top: 16px; font-size: 14px;"></p>
    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script>
    const currentUser = getCurrentUser();
    if (!currentUser) { window.location.href = '../index.html'; }

    let editFotos = [];
    let editPreferencias = [];

    // Carregar dados atuais
    function loadData() {
      document.getElementById('editNick').value = currentUser.nick || '';
      document.getElementById('editNomeDele').value = currentUser.nomeDele || '';
      document.getElementById('editNomeDela').value = currentUser.nomeDela || '';
      document.getElementById('editIdadeDele').value = currentUser.idadeDele || 30;
      document.getElementById('editIdadeDela').value = currentUser.idadeDela || 28;
      document.getElementById('editCidade').value = currentUser.cidade || '';
      document.getElementById('editBio').value = currentUser.bio || '';

      if (currentUser.online) document.getElementById('statusOnline').checked = true;
      else document.getElementById('statusOffline').checked = true;

      editFotos = [...(currentUser.fotos || [])];
      editPreferencias = [...(currentUser.preferencias || [])];
      renderPhotos();
      renderPrefs();
    }

    // Render fotos
    function renderPhotos() {
      const grid = document.getElementById('photoGrid');
      grid.innerHTML = '';
      editFotos.forEach((url, i) => {
        const isBlob = url.startsWith('blob:');
        const displayUrl = isBlob ? 'https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=400&h=400&fit=crop' : url;
        grid.innerHTML += `<div class="photo-item" style="${isBlob ? 'opacity:0.5;' : ''}"><img src="${displayUrl}" alt="" onerror="this.src='https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=400&h=400&fit=crop'"><div class="photo-remove" onclick="removePhoto(${i})">&times;</div>${isBlob ? '<div style="position:absolute;bottom:2px;left:2px;background:#f56565;color:#fff;font-size:9px;padding:1px 4px;border-radius:4px;">ERRO</div>' : ''}</div>`;
      });
      if (editFotos.length < 6) {
        grid.innerHTML += `<div id="btnAddPhoto" class="photo-add"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span style="font-size: 11px; margin-top: 4px;">Adicionar</span></div>`;
        document.getElementById('btnAddPhoto').addEventListener('click', () => fileInput.click());
      }
    }

    window.removePhoto = function(i) {
      editFotos.splice(i, 1);
      renderPhotos();
    };

    // Upload foto
    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      const statusEl = document.getElementById('uploadStatus');
      for (const file of files) {
        if (editFotos.length >= 6) break;
        statusEl.textContent = 'Enviando...';
        const url = await uploadImage(file);
        if (url) {
          editFotos.push(url);
          statusEl.textContent = '';
        } else {
          statusEl.textContent = 'Erro no upload';
        }
      }
      fileInput.value = '';
      renderPhotos();
    });

    // Preferencias
    function renderPrefs() {
      document.querySelectorAll('.pref-item').forEach(item => {
        const pref = item.dataset.pref;
        const isActive = editPreferencias.includes(pref);
        item.classList.toggle('active', isActive);
        item.addEventListener('click', () => {
          item.classList.toggle('active');
          if (item.classList.contains('active')) {
            if (!editPreferencias.includes(pref)) editPreferencias.push(pref);
          } else {
            editPreferencias = editPreferencias.filter(p => p !== pref);
          }
        });
      });
    }

    // Salvar
    document.getElementById('btnSave').addEventListener('click', async () => {
      const btn = document.getElementById('btnSave');
      const statusEl = document.getElementById('saveStatus');
      btn.disabled = true;
      btn.textContent = 'Salvando...';
      statusEl.textContent = '';
      statusEl.style.color = '';

      // Remover fotos blob quebradas
      const validFotos = editFotos.filter(url => !url.startsWith('blob:'));

      const updates = {
        nomeDele: document.getElementById('editNomeDele').value.trim(),
        nomeDela: document.getElementById('editNomeDela').value.trim(),
        idadeDele: parseInt(document.getElementById('editIdadeDele').value) || 30,
        idadeDela: parseInt(document.getElementById('editIdadeDela').value) || 28,
        cidade: document.getElementById('editCidade').value.trim(),
        bio: document.getElementById('editBio').value.trim(),
        preferencias: editPreferencias,
        fotos: validFotos,
        online: document.getElementById('statusOnline').checked,
      };

      // Atualizar localStorage
      const updatedUser = { ...currentUser, ...updates };
      setCurrentUser(updatedUser);

      // Atualizar na lista de profiles
      const profiles = DB.get('profiles', []);
      const idx = profiles.findIndex(p => p.id === currentUser.id);
      if (idx >= 0) profiles[idx] = updatedUser;
      else profiles.push(updatedUser);
      DB.set('profiles', profiles);

      // Tentar atualizar no Supabase
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${currentUser.id}`, {
          method: 'PATCH',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify({
            nome_dele: updates.nomeDele, nome_dela: updates.nomeDela,
            idade_dele: updates.idadeDele, idade_dela: updates.idadeDela,
            cidade: updates.cidade, bio: updates.bio,
            preferencias: updates.preferencias, fotos: updates.fotos,
            online: updates.online,
          }),
        });
      } catch (e) { console.log('Supabase update falhou, salvo localmente'); }

      statusEl.textContent = 'Perfil atualizado com sucesso!';
      statusEl.style.color = '#48bb78';
      btn.disabled = false;
      btn.textContent = 'Salvar Alteracoes';

      setTimeout(() => window.location.href = 'perfil.html', 800);
    });

    loadData();
  </script>
</body>
</html>
